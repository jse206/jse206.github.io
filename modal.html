<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Configurar reglas de la tarjeta</title>
  <!--
    modal.html
    ==========
    Interfaz de configuración por tarjeta. El usuario define aquí qué reglas
    se aplicarán cuando pulse el botón principal:
      - Etiquetas que se añaden o eliminan según condiciones
      - Lista de destino a la que se moverá la tarjeta

    Trello carga este HTML dentro de un popup/modal gestionado por el SDK.
  -->
  <link rel="stylesheet" href="styles.css" />
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div class="pu-modal">
    <h2 class="pu-title">⚙️ Configurar reglas del botón</h2>
    <p class="pu-subtitle">
      Define qué ocurre cuando se pulse <strong>"Aplicar reglas"</strong> en esta tarjeta.
    </p>

    <!-- ── SECCIÓN: Etiquetas ─────────────────────────────────────── -->
    <section class="pu-section">
      <h3>Etiquetas</h3>

      <label class="pu-label" for="labelsAdd">
        Añadir etiquetas (IDs separados por coma)
        <span class="pu-hint">Encuéntralos en: Tablero → Etiquetas → copia el ID de la URL</span>
      </label>
      <input id="labelsAdd" class="pu-input" type="text"
             placeholder="p. ej. 63a1f2…, 63a1f3…" />

      <label class="pu-label" for="labelsRemove">
        Quitar etiquetas (IDs separados por coma)
      </label>
      <input id="labelsRemove" class="pu-input" type="text"
             placeholder="p. ej. 63a1f4…" />
    </section>

    <!-- ── SECCIÓN: Mover tarjeta ─────────────────────────────────── -->
    <section class="pu-section">
      <h3>Mover tarjeta</h3>

      <label class="pu-label" for="targetList">
        Lista de destino
        <span class="pu-hint">Selecciona la lista a la que se moverá la tarjeta al ejecutar el botón</span>
      </label>
      <select id="targetList" class="pu-input">
        <option value="">— Sin movimiento —</option>
        <!-- Las opciones se rellenan dinámicamente con JS -->
      </select>
    </section>

    <!-- ── SECCIÓN: Condición ─────────────────────────────────────── -->
    <section class="pu-section">
      <h3>Condición (opcional)</h3>
      <p class="pu-hint">
        Si defines una condición, las reglas solo se aplican cuando se cumple.
        Déjalo vacío para ejecutar siempre.
      </p>

      <label class="pu-label" for="condLabel">
        Solo si la tarjeta YA TIENE esta etiqueta (ID)
      </label>
      <input id="condLabel" class="pu-input" type="text"
             placeholder="ID de etiqueta (opcional)" />
    </section>

    <!-- ── ACCIONES ───────────────────────────────────────────────── -->
    <div class="pu-actions">
      <button id="btnSave" class="pu-btn pu-btn-primary">Guardar reglas</button>
      <button id="btnCancel" class="pu-btn pu-btn-secondary">Cancelar</button>
    </div>

    <p id="pu-status" class="pu-status"></p>
  </div>

  <script>
    // ── Inicializar el iframe del modal ──────────────────────────────────────
    const t = TrelloPowerUp.iframe();

    // ── Cargar listas del tablero para el <select> ───────────────────────────
    t.board('lists').then(function (board) {
      const select = document.getElementById('targetList');
      (board.lists || []).forEach(function (list) {
        const opt = document.createElement('option');
        opt.value = list.id;
        opt.textContent = list.name;
        select.appendChild(opt);
      });
    });

    // ── Cargar configuración previamente guardada en esta tarjeta ────────────
    t.get('card', 'shared', 'smartButtonRules', null).then(function (rules) {
      if (!rules) return;
      document.getElementById('labelsAdd').value    = (rules.labelsAdd    || []).join(', ');
      document.getElementById('labelsRemove').value = (rules.labelsRemove || []).join(', ');
      document.getElementById('targetList').value   = rules.targetList   || '';
      document.getElementById('condLabel').value    = rules.condLabel    || '';
    });

    // ── Guardar reglas ───────────────────────────────────────────────────────
    document.getElementById('btnSave').addEventListener('click', function () {
      const status = document.getElementById('pu-status');

      // Parsear IDs de etiquetas (limpiar espacios en blanco)
      const labelsAdd = document.getElementById('labelsAdd').value
        .split(',').map(s => s.trim()).filter(Boolean);
      const labelsRemove = document.getElementById('labelsRemove').value
        .split(',').map(s => s.trim()).filter(Boolean);
      const targetList = document.getElementById('targetList').value;
      const condLabel  = document.getElementById('condLabel').value.trim();

      const rules = { labelsAdd, labelsRemove, targetList, condLabel };

      // `t.set` persiste datos en el scope 'card' → 'shared'
      // 'shared' hace que sean visibles para cualquier miembro del tablero.
      t.set('card', 'shared', 'smartButtonRules', rules)
        .then(function () {
          status.textContent = '✅ Reglas guardadas correctamente.';
          status.style.color = '#00875A';
          // Cerrar el popup tras 1 segundo
          setTimeout(function () { t.closePopup(); }, 1000);
        })
        .catch(function (err) {
          status.textContent = '❌ Error al guardar: ' + err.message;
          status.style.color = '#DE350B';
        });
    });

    // ── Cancelar ─────────────────────────────────────────────────────────────
    document.getElementById('btnCancel').addEventListener('click', function () {
      t.closePopup();
    });

    // ── Ajustar altura del popup al contenido ────────────────────────────────
    t.render(function () {
      t.sizeTo('#root').catch(function () {});
    });
  </script>
</body>
</html>
