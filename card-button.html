<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Card Button</title>
  <!--
    card-button.html
    ================
    Trello carga este iframe cuando el usuario pulsa el botón de la tarjeta.
    Su único trabajo es redirigir el control a client.js a través del SDK.
    No muestra contenido visual propio.
  -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // El SDK de Trello expone `TrelloPowerUp.iframe()` para iframes secundarios.
    // Aquí no necesitamos lógica adicional; toda la acción ocurre en client.js
    // mediante el callback `card-buttons`.
  </script>
</body>
</html>
